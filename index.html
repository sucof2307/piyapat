<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Sarabun', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
                    <h4 class="mb-0">ฟอร์มบันทึกข้อมูลนักเรียน</h4>
                </div>
                <div class="card-body p-4">
                    <form id="studentForm">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">คำนำหน้าชื่อ</label>
                                <select class="form-select" id="prefix" required>
                                    <option value="" disabled selected>เลือก...</option>
                                    <option value="เด็กชาย">เด็กชาย</option>
                                    <option value="เด็กหญิง">เด็กหญิง</option>
                                    <option value="นาย">นาย</option>
                                    <option value="นางสาว">นางสาว</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">ชื่อ</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">นามสกุล</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">ชั้นมัธยมศึกษาปีที่</label>
                                <select class="form-select" id="grade" required>
                                    <option value="" disabled selected>เลือก...</option>
                                    <option value="1">ม.1</option>
                                    <option value="2">ม.2</option>
                                    <option value="3">ม.3</option>
                                    <option value="4">ม.4</option>
                                    <option value="5">ม.5</option>
                                    <option value="6">ม.6</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">ห้อง</label>
                                <input type="number" class="form-control" id="room" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">เลขที่</label>
                                <input type="number" class="form-control" id="number" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">น้ำหนัก (กก.)</label>
                                <input type="number" step="0.1" class="form-control" id="weight" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">ส่วนสูง (ซม.)</label>
                                <input type="number" step="0.1" class="form-control" id="height" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-bold">บันทึกข้อมูล</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ใช้ URL Web App ที่คุณให้มา
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyNGw6699xVcj0bD24dQ9mLPzlGZwRmY1PQUNL61BkFlpoMuVEjmxYdvJNwJzmA2Rrl/exec";

    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 1. แสดง SweetAlert รอการบันทึก
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            text: 'ระบบกำลังส่งข้อมูลไปยัง Google Sheets',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // 2. รวบรวมข้อมูล
        const studentData = {
            prefix: document.getElementById('prefix').value,
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            grade: document.getElementById('grade').value,
            room: document.getElementById('room').value,
            number: document.getElementById('number').value,
            weight: document.getElementById('weight').value,
            height: document.getElementById('height').value
        };

        // 3. กำหนดฟังก์ชัน Callback สำหรับ JSONP
        const callbackName = 'jsonpCallback_' + Date.now();
        
        window[callbackName] = function(response) {
            if (response.status === 'success') {
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    text: 'ข้อมูลถูกบันทึกลงใน Google Sheets เรียบร้อยแล้ว',
                    confirmButtonText: 'ตกลง'
                });
                document.getElementById('studentForm').reset();
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: response.message
                });
            }
            document.body.removeChild(script);
            delete window[callbackName];
        };

        // 4. แปลงข้อมูลส่งออกแบบ JSONP
        const searchParams = new URLSearchParams(studentData);
        searchParams.append('callback', callbackName);

        const script = document.createElement('script');
        script.src = webAppUrl + '?' + searchParams.toString();
        
        script.onerror = function() {
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว',
                text: 'กรุณาตรวจสอบอินเทอร์เน็ต หรือตรวจเช็กว่า Web App ได้ถูกตั้งค่าสิทธิ์เป็น Everyone แล้วหรือยัง'
            });
            delete window[callbackName];
        };

        document.body.appendChild(script);
    });
</script>

</body>
</html>
